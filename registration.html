<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Live Music Event</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">Live Music Event</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="tickets.html">Tickets</a></li>
                <li><a href="registration.html" class="active">Registration</a></li>
            </ul>
        </div>
    </nav>

    <header class="tickets-hero">
        <div class="hero-content">
            <h1>Event Registration</h1>
            <p>Register your details and we will contact you with updates.</p>
        </div>
    </header>

    <section class="registration-content">
        <div class="registration-card">
            <h2>Register</h2>
            <p class="registration-helper-text">Fill out the form below to register for the event.</p>
            <form id="registration-form" class="registration-form" action="https://docs.google.com/forms/d/e/1FAIpQLScUS_Hb3W0_gZkwmhb2JpAQEoRyXeSAfsURMI72lQWbX5JDjg/formResponse" method="POST" target="hidden_iframe">
                <input id="google-email-address" name="emailAddress" type="hidden">
                <input name="fvv" type="hidden" value="1">
                <input name="pageHistory" type="hidden" value="0">
                <div class="form-field">
                    <label for="first-name">First Name</label>
                    <input id="first-name" name="entry.2005620554" type="text" required>
                </div>
                <div class="form-field">
                    <label for="last-name">Last Name</label>
                    <input id="last-name" name="entry.1314266813" type="text" required>
                </div>
                <div class="form-field">
                    <label for="email-address">Email Address</label>
                    <input id="email-address" name="entry.904923101" type="email" required>
                </div>
                <div class="form-field">
                    <label for="phone-number">Phone Number</label>
                    <input id="phone-number" name="entry.1166974658" type="tel">
                </div>
                <button type="submit" class="cta-button registration-submit">Submit Registration</button>
            </form>
            <p id="registration-message" class="registration-message" aria-live="polite"></p>
            <iframe name="hidden_iframe" title="hidden registration target" class="hidden-iframe"></iframe>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Live Music Event. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const registrationForm = document.getElementById('registration-form');
        const emailInput = document.getElementById('email-address');
        const registrationMessage = document.getElementById('registration-message');
        const googleEmailAddressInput = document.getElementById('google-email-address');
        const hiddenIframe = document.querySelector('iframe[name="hidden_iframe"]');
        let isAwaitingSubmitResult = false;
        let pendingSubmitTimer = null;

        registrationForm.addEventListener('submit', function (event) {
            const hasEmail = emailInput.value.trim().length > 0;
            if (!hasEmail) {
                event.preventDefault();
                registrationMessage.textContent = 'Please provide an email address.';
                registrationMessage.className = 'registration-message error';
                return;
            }
            googleEmailAddressInput.value = emailInput.value.trim();
            isAwaitingSubmitResult = true;
            window.clearTimeout(pendingSubmitTimer);
            registrationMessage.textContent = 'Submitting...';
            registrationMessage.className = 'registration-message';
            pendingSubmitTimer = window.setTimeout(function () {
                if (!isAwaitingSubmitResult) {
                    return;
                }
                isAwaitingSubmitResult = false;
                registrationMessage.textContent = 'We could not confirm your submission. Please try again.';
                registrationMessage.className = 'registration-message error';
            }, 8000);
        });

        hiddenIframe.addEventListener('load', function () {
            if (!isAwaitingSubmitResult) {
                return;
            }
            isAwaitingSubmitResult = false;
            window.clearTimeout(pendingSubmitTimer);
            registrationMessage.textContent = 'Registration submitted. Thank you!';
            registrationMessage.className = 'registration-message success';
            window.setTimeout(function () {
                registrationForm.reset();
            }, 300);
        });
    </script>
</body>
</html>
